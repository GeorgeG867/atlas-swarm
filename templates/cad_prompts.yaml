# Atlas Swarm — LLM prompt templates and runtime constants.
# All prompt text and numeric constants live here — no hardcoding in Python.

# Printer/geometry constraints (used by both prompt rendering and auto-scale)
printer:
  max_x_mm: 256
  max_y_mm: 256
  max_z_mm: 256
  target_max_mm: 200          # auto-scale target (leaves margin from max)
  min_wall_mm: 1.5

# Prompt templates — use {placeholders} that Python's str.format() fills in
prompts:
  cad_design:
    user: |
      You are an experienced product designer writing a CadQuery script for a
      single-piece 3D-printed consumer product.  Produce real, saleable
      geometry — NOT a featureless box.

      PRODUCT TO DESIGN: {description}

      PATENT MECHANISM (what the product physically must do):
      {mechanism}

      COMPETITIVE CONTEXT (top Amazon/Etsy sellers — match or beat these):
      {competitive_intel}

      DESIGN PROCESS (think step-by-step BEFORE writing code):
      1. Read the mechanism — what MOVES, HOLDS, ALIGNS, or GRIPS?
      2. Map each mechanism function to a CadQuery primitive:
         - holds a phone/tablet/item   -> slot, groove, lip, tongue
         - aligns two parts            -> rail, dovetail, chamfer
         - grips or mounts             -> cantilever clip, living hinge, snap-fit, C-clamp
         - cushions or grips surface   -> ribbed pad, knurl, flare
         - resists bending             -> fillet, rib, gusset
         - provides clearance          -> pocket, relief, undercut
      3. Ensure the shape resembles the competitive target — if top sellers
         have an adjustable angle, YOUR design MUST have an adjustable angle.
      4. Use the MUST-HAVE features as mandatory geometry, DIFFERENTIATORS
         as distinguishing touches.

      REFERENCE EXAMPLE ({category}):
      ```
      import cadquery as cq
      import math
      {example}
      ```

      DIMENSION RULES:
      - Final object must fit in a {max_x}x{max_y}x{max_z}mm box (printer bed).
      - Treat this as a hand-held consumer product at real scale.
      - All dimensions in the 10-{target_max}mm range.
      - Minimum wall thickness: {min_wall}mm.
      - Add at least 3 functional features (slot, hole, fillet, rib, cutout,
        or snap).  Pure extrusions of a rectangle are FORBIDDEN.

      OUTPUT RULES:
      - Adapt the example above — do not start from scratch.
      - The final solid MUST be assigned to a variable named `result`.
      - Return ONLY the Python code (no prose, no markdown fences).

    retry: |
      Your previous code failed: {last_error}

      Fix the error AND keep the mechanism-driven features.  Simpler geometry
      is acceptable, but the product must still have the functional features
      listed in the brief.  Do NOT degrade to a featureless box.

      Working example for reference:
      ```
      import cadquery as cq
      {example}
      ```

      Task: {description}
      Mechanism: {mechanism}
      Must compile.  Assign the final solid to `result`.
      Dimensions in 10-{target_max}mm range.
      Output ONLY Python code.

  product_photo:
    template: |
      A professional product photograph of {subject}, made of {material}, white studio background, soft gradient, 3-point studio lighting, 45 degree angle, sharp focus, high detail, 4K, photorealistic, product photography, commercial, clean, no text
