<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas 3D Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a14; color: #eee; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

#header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,20,0.95); padding: 10px 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    border-bottom: 1px solid #1e1e30;
}
#header h1 { font-size: 14px; color: #00d4ff; white-space: nowrap; }

input[type="text"], button {
    background: #12122a; color: #ccc; border: 1px solid #2a2a40;
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: inherit;
}
input[type="text"] { cursor: text; min-width: 240px; }
button:hover { border-color: #00d4ff; }
button.primary { background: #00d4ff; color: #000; font-weight: 600; border: none; }
button.primary:hover { background: #33e0ff; }
button.accent { background: #8b5cf6; color: #fff; font-weight: 600; border: none; }
button.accent:hover { background: #a78bfa; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

#opp-panel {
    position: fixed; top: 56px; left: 12px; z-index: 99;
    background: rgba(10,10,20,0.92); padding: 12px 14px; border-radius: 8px;
    border: 1px solid #1e1e30; max-width: 380px; font-size: 12px;
}
#opp-panel .title { color: #00d4ff; font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
#opp-panel .row { display: flex; gap: 8px; margin-bottom: 4px; }
#opp-panel .key { color: #666; min-width: 70px; }
#opp-panel .val { color: #bbb; flex: 1; }
#opp-panel .score { color: #4ade80; font-weight: 600; }
#opp-panel .empty { color: #666; font-style: italic; }

#bottom-strip {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,20,0.85); padding: 6px 14px; border-radius: 6px;
    border: 1px solid #1e1e30; font-size: 11px; color: #555;
}
#bottom-strip .dims { color: #999; margin-right: 12px; }
#bottom-strip .good { color: #4ade80; }

#viewer { width: 100vw; height: 100vh; }

#render-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200; background: rgba(0,0,0,0.88);
    justify-content: center; align-items: center; flex-direction: column;
}
#render-overlay.visible { display: flex; }
#render-overlay img { max-width: 80vw; max-height: 70vh; border-radius: 8px; border: 2px solid #333; }
#render-overlay .close-btn { margin-top: 12px; }
#render-overlay .status { color: #00d4ff; font-size: 16px; margin: 20px; }

#loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 16px; color: #00d4ff; display: none;
    background: rgba(10,10,20,0.85); padding: 14px 24px; border-radius: 8px;
    border: 1px solid #1e1e30;
}
</style>
</head>
<body>

<div id="header">
    <h1>Atlas 3D Studio</h1>
    <button class="primary" id="btn-next">&#x21bb; Next Opportunity</button>
    <input type="text" id="design-input" placeholder="Or describe something custom...">
    <button id="btn-generate">Generate Custom</button>
    <button class="accent" id="btn-render">Render Photo</button>
    <button id="btn-download">Download GLB</button>
</div>

<div id="opp-panel">
    <div class="title" id="opp-title">Loading opportunity...</div>
    <div class="row"><span class="key">Market:</span><span class="val" id="opp-market">&mdash;</span></div>
    <div class="row"><span class="key">Size:</span><span class="val" id="opp-size">&mdash;</span></div>
    <div class="row"><span class="key">Revenue:</span><span class="val" id="opp-revenue">&mdash;</span></div>
    <div class="row"><span class="key">Score:</span><span class="val score" id="opp-score">&mdash;</span></div>
    <div class="row"><span class="key">TRIZ:</span><span class="val" id="opp-triz">&mdash;</span></div>
    <div class="row"><span class="key">Source:</span><span class="val" id="opp-source">IdeaFrog</span></div>
</div>

<div id="viewer"></div>

<div id="bottom-strip">
    <span class="dims" id="info-dims">&mdash;</span>
    <span class="dims" id="info-verts">&mdash;</span>
    <span id="info-file">&mdash;</span>
</div>

<div id="render-overlay">
    <div class="status" id="render-status"></div>
    <img id="render-image" src="" alt="Product Render" style="display:none;">
    <button class="close-btn" onclick="document.getElementById('render-overlay').classList.remove('visible')">Close</button>
</div>

<div id="loading"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── Scene ───────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 5000);
camera.position.set(2.5, 1.8, 2.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('viewer').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;

// ── Procedural studio environment ───────────────────────────
const pmrem = new THREE.PMREMGenerator(renderer);
(function setEnv() {
    const size = 256;
    const data = new Float32Array(size * size * 4);
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            const i = (y * size + x) * 4;
            const ny = y / size;
            const horizon = Math.exp(-Math.pow((ny - 0.5) * 6, 2)) * 0.8;
            const sky = Math.max(0, 1.0 - ny) * 0.15;
            data[i]     = 0.12 + horizon * 0.9 + sky * 0.3;
            data[i + 1] = 0.12 + horizon * 0.85 + sky * 0.35;
            data[i + 2] = 0.15 + horizon * 0.95 + sky * 0.5;
            data[i + 3] = 1.0;
        }
    }
    const tex = new THREE.DataTexture(data, size, size, THREE.RGBAFormat, THREE.FloatType);
    tex.mapping = THREE.EquirectangularReflectionMapping;
    tex.needsUpdate = true;
    scene.environment = pmrem.fromEquirectangular(tex).texture;
    tex.dispose();
})();

const keyLight = new THREE.DirectionalLight(0xfff5e8, 2.2);
keyLight.position.set(3, 5, 3); keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048); scene.add(keyLight);
scene.add(new THREE.DirectionalLight(0xc8d8ff, 0.7));
scene.add(new THREE.AmbientLight(0x202030, 0.4));

// ── Subtle floor (much smaller now since GLBs are ~1 unit scale) ──
const floor = new THREE.Mesh(
    new THREE.CircleGeometry(5, 64),
    new THREE.MeshStandardMaterial({ color: 0x0d0d18, roughness: 0.65, metalness: 0.05 })
);
floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
scene.add(floor);

// ── State ────────────────────────────────────────────────────
let currentMesh = null;
let currentOpp = null;
let currentGLB = null;
const gltfLoader = new GLTFLoader();

function clearModel() {
    if (!currentMesh) return;
    scene.remove(currentMesh);
    currentMesh.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
    });
    currentMesh = null;
}

function fitCamera(obj) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = new THREE.Vector3(); box.getSize(size);
    const center = new THREE.Vector3(); box.getCenter(center);
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    camera.position.set(center.x + maxDim * 1.6, center.y + maxDim * 1.0, center.z + maxDim * 1.6);
    controls.target.copy(center);
    controls.update();

    document.getElementById('info-dims').textContent =
        `${size.x.toFixed(2)}\u00D7${size.y.toFixed(2)}\u00D7${size.z.toFixed(2)}`;
}

function loadGLB(url, filename) {
    const ld = document.getElementById('loading');
    ld.style.display = 'block';
    ld.textContent = 'Loading 3D model...';
    clearModel();

    gltfLoader.load(url, (gltf) => {
        const model = gltf.scene;
        model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        scene.add(model);
        currentMesh = model;
        currentGLB = filename;
        fitCamera(model);

        let verts = 0;
        model.traverse(c => { if (c.geometry) verts += c.geometry.attributes.position.count; });
        document.getElementById('info-verts').textContent = `${verts.toLocaleString()} verts`;
        document.getElementById('info-file').textContent = filename;
        ld.style.display = 'none';
    }, undefined, (err) => {
        ld.textContent = 'Model load error: ' + (err.message || 'unknown');
        setTimeout(() => { ld.style.display = 'none'; }, 3000);
    });
}

// ── Display opportunity metadata ─────────────────────────────
function showOpportunity(opp) {
    currentOpp = opp || {};
    const titleEl = document.getElementById('opp-title');
    const d = document;
    if (!opp) {
        titleEl.textContent = 'No opportunity loaded';
        titleEl.className = 'title empty';
        ['opp-market','opp-size','opp-revenue','opp-score','opp-triz'].forEach(id => d.getElementById(id).textContent = '\u2014');
        return;
    }
    titleEl.className = 'title';
    titleEl.textContent = opp.title || 'Untitled';
    d.getElementById('opp-market').textContent = opp.market || '\u2014';
    d.getElementById('opp-size').textContent = opp.market_size || '\u2014';
    d.getElementById('opp-revenue').textContent = opp.revenue_model || '\u2014';
    d.getElementById('opp-score').textContent = opp.swarm_score ? `${opp.swarm_score}/100` : '\u2014';
    d.getElementById('opp-triz').textContent = opp.triz_principle || '\u2014';
    d.getElementById('opp-source').textContent = opp.source || 'IdeaFrog';
}

// ── Pull next IdeaFrog opportunity + render ──────────────────
async function loadNextOpportunity() {
    const btn = document.getElementById('btn-next');
    const ld = document.getElementById('loading');
    btn.disabled = true;
    const start = Date.now();
    const ticker = setInterval(() => {
        const s = Math.round((Date.now() - start) / 1000);
        ld.textContent = `Fetching opportunity + rendering... ${s}s`;
    }, 1000);
    ld.style.display = 'block';
    ld.textContent = 'Fetching opportunity + rendering... 0s';

    try {
        const res = await fetch('/autonomous/next', { method: 'POST' });
        const data = await res.json();
        clearInterval(ticker);
        if (!data.success || !data.glb_filename) {
            ld.textContent = `Error: ${data.error || 'no GLB returned'}`;
            setTimeout(() => { ld.style.display = 'none'; }, 4000);
            return;
        }
        showOpportunity(data.opportunity);
        loadGLB(`/renders/${data.glb_filename}?_=${Date.now()}`, data.glb_filename);
    } catch (err) {
        clearInterval(ticker);
        ld.textContent = 'Error: ' + err.message;
        setTimeout(() => { ld.style.display = 'none'; }, 4000);
    } finally {
        btn.disabled = false;
    }
}

// ── Manual override: generate from custom description ────────
async function generateCustom() {
    const input = document.getElementById('design-input');
    const desc = input.value.trim();
    if (!desc) { input.focus(); return; }
    const ld = document.getElementById('loading');
    input.disabled = true;

    const start = Date.now();
    const ticker = setInterval(() => {
        const s = Math.round((Date.now() - start) / 1000);
        ld.textContent = `Generating "${desc}"... ${s}s`;
    }, 1000);
    ld.style.display = 'block';
    ld.textContent = `Generating "${desc}"... 0s`;

    try {
        const safeName = desc.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
        const res = await fetch(
            `/text-to-3d?description=${encodeURIComponent(desc)}&product_name=${encodeURIComponent(safeName)}`,
            { method: 'POST' }
        );
        const data = await res.json();
        clearInterval(ticker);
        if (!data.success || !data.glb_filename) {
            ld.textContent = `Error: ${data.error || 'no GLB'}`;
            setTimeout(() => { ld.style.display = 'none'; }, 4000);
            return;
        }
        showOpportunity({
            title: desc, source: 'user', market: null, market_size: null,
            revenue_model: null, swarm_score: null, triz_principle: null,
        });
        loadGLB(`/renders/${data.glb_filename}?_=${Date.now()}`, data.glb_filename);
        input.value = '';
    } catch (err) {
        clearInterval(ticker);
        ld.textContent = 'Error: ' + err.message;
        setTimeout(() => { ld.style.display = 'none'; }, 4000);
    } finally {
        input.disabled = false;
    }
}

// ── Render Photo (Flux.1 reuse) ──────────────────────────────
async function renderPhoto() {
    const name = (currentOpp && currentOpp.title) ? currentOpp.title : 'product';
    const desc = (currentOpp && currentOpp.description) ? currentOpp.description : name;
    const overlay = document.getElementById('render-overlay');
    const status = document.getElementById('render-status');
    const img = document.getElementById('render-image');
    overlay.classList.add('visible');
    img.style.display = 'none';
    status.style.display = 'block';

    const start = Date.now();
    const ticker = setInterval(() => {
        status.textContent = `Rendering "${name}"... ${Math.round((Date.now() - start) / 1000)}s`;
    }, 1000);
    status.textContent = `Rendering "${name}"... 0s`;

    try {
        const r = await fetch(
            `/visualize?product_name=${encodeURIComponent(name)}&description=${encodeURIComponent(desc)}&material=${encodeURIComponent('natural product appearance')}`,
            { method: 'POST' }
        );
        const data = await r.json();
        clearInterval(ticker);
        if (data.image_base64) {
            img.src = `data:image/png;base64,${data.image_base64}`;
            img.style.display = 'block'; status.style.display = 'none';
        } else if (data.image_path) {
            img.src = `/renders/${data.image_path.split('/').pop()}`;
            img.style.display = 'block'; status.style.display = 'none';
        } else {
            status.textContent = `No image returned (${data.model || 'unknown'})`;
        }
    } catch (err) {
        clearInterval(ticker);
        status.textContent = 'Error: ' + err.message;
    }
}

function downloadGLB() {
    if (!currentGLB) return;
    const a = document.createElement('a');
    a.href = `/renders/${currentGLB}`;
    a.download = currentGLB;
    a.click();
}

// ── Wire up events ──────────────────────────────────────────
document.getElementById('btn-next').addEventListener('click', loadNextOpportunity);
document.getElementById('btn-generate').addEventListener('click', generateCustom);
document.getElementById('btn-render').addEventListener('click', renderPhoto);
document.getElementById('btn-download').addEventListener('click', downloadGLB);
document.getElementById('design-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateCustom();
});

renderer.domElement.addEventListener('dblclick', () => { if (currentMesh) fitCamera(currentMesh); });
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
animate();

// ── Auto-load first opportunity on page load ────────────────
loadNextOpportunity();
</script>
</body>
</html>
